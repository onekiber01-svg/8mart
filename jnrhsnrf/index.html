<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>С 8 Марта</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: "Segoe UI", sans-serif;
}

body{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background: linear-gradient(135deg,#ff9ecf,#ffd6f0,#fff3b0);
overflow:hidden;
}

/* контейнер */

.container{
text-align:center;
}

/* кнопка */

button{
padding:20px 60px;
font-size:28px;
border:none;
border-radius:50px;
cursor:pointer;

color:white;
background:linear-gradient(45deg,#ff4fa3,#ff7ac6);

box-shadow:
0 10px 25px rgba(0,0,0,0.25),
0 0 30px rgba(255,100,200,0.4);

transition:0.4s;
}

button:hover{
transform:scale(1.1);
box-shadow:
0 15px 40px rgba(0,0,0,0.3),
0 0 60px rgba(255,100,200,0.6);
}

/* затемнение */

.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.65);

display:flex;
align-items:center;
justify-content:center;

opacity:0;
pointer-events:none;
transition:0.6s;
}

/* изображение */

.card{
max-width:90%;
max-height:90%;
border-radius:20px;

box-shadow:
0 40px 100px rgba(0,0,0,0.6),
0 0 80px rgba(255,200,255,0.4);

transform:scale(0.6);
transition:0.7s;
}

/* активное состояние */

.overlay.active{
opacity:1;
pointer-events:auto;
}

.overlay.active .card{
transform:scale(1);
}

/* декоративные цветочки */

.flower{
position:absolute;
font-size:30px;
animation: float 6s infinite ease-in-out;
opacity:0.6;
}

@keyframes float{
0%{transform:translateY(0)}
50%{transform:translateY(-30px)}
100%{transform:translateY(0)}
}

</style>
</head>

<body>

<div class="container">
<button onclick="openCard()">Открыть поздравление 💐</button>
</div>

<div class="overlay" id="overlay" onclick="closeCard()">

<img class="card" src="картинка.jpg">

</div>

<!-- декоративные цветочки -->

<div class="flower" style="left:10%;top:20%">🌸</div>
<div class="flower" style="left:80%;top:30%">🌷</div>
<div class="flower" style="left:20%;top:80%">🌺</div>
<div class="flower" style="left:70%;top:70%">🌼</div>

<script>

function openCard(){
document.getElementById("overlay").classList.add("active")
}

function closeCard(){
document.getElementById("overlay").classList.remove("active")
}

</script>

</body>
</html>
